<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>About Us - PT Muda Karya Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#F8F4EE;--dark:#1A1A14;--forest:#2C4A2E;--gold:#7A5500;--goldl:#C48A00;--muted:#3A3A2A;--bdr:rgba(44,74,46,0.15)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:72px;background:rgba(248,244,238,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--bdr)}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo img{width:44px;height:44px;object-fit:contain}
.nl-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--forest);line-height:1.2}
.nl-sub{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:400}
.nav-mid{display:flex;align-items:center;gap:28px}
.nav-mid a{text-decoration:none;font-size:13px;letter-spacing:.05em;color:var(--muted);transition:color .2s;text-transform:uppercase;font-weight:500}
.nav-mid a:hover,.nav-mid a.act{color:var(--forest)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-cta{background:var(--forest);color:#F8F4EE;padding:10px 20px;border-radius:2px;text-decoration:none;font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:background .2s}
.nav-cta:hover{background:var(--dark)}
.lsw{display:flex;border:1.5px solid var(--bdr);border-radius:3px;overflow:hidden}
.lb{padding:6px 13px;font-size:11px;font-weight:700;letter-spacing:.08em;cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .2s;text-transform:uppercase}
.lb.on{background:var(--forest);color:#F8F4EE}
.lb:not(.on):hover{background:rgba(44,74,46,.08);color:var(--forest)}
.nt{display:none;cursor:pointer;flex-direction:column;gap:5px;background:none;border:none;padding:4px}
.nt span{width:24px;height:1.5px;background:var(--forest);display:block}
.mm{display:none;position:fixed;top:72px;left:0;right:0;background:var(--cream);border-bottom:1px solid var(--bdr);flex-direction:column;z-index:999}
.mm.open{display:flex}
.mm a{text-decoration:none;font-size:14px;font-weight:500;color:var(--dark);text-transform:uppercase;letter-spacing:.06em;padding:15px 5vw;border-bottom:1px solid var(--bdr)}
.mm-lang{display:flex;gap:10px;padding:16px 5vw}
.mlb{padding:8px 20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--bdr);background:transparent;font-family:'DM Sans',sans-serif;color:var(--muted);border-radius:2px;text-transform:uppercase}
.mlb.on{background:var(--forest);color:#F8F4EE;border-color:var(--forest)}
.si{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.si::before{content:'';width:24px;height:1px;background:var(--gold)}
.st{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,4vw,52px);font-weight:300;line-height:1.12;color:var(--dark)}
.st em{font-style:italic;color:var(--forest)}
.ss{font-size:15px;color:var(--muted);line-height:1.8;max-width:560px;margin-top:16px;font-weight:300}
.bp{display:inline-block;padding:15px 34px;background:var(--forest);color:#F8F4EE;text-decoration:none;font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;border-radius:2px;transition:all .25s}
.bp:hover{background:var(--dark);transform:translateY(-1px)}
.bo{display:inline-flex;align-items:center;gap:8px;padding:15px 0;color:var(--forest);text-decoration:none;font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--forest);transition:gap .2s;cursor:pointer}
.bo:hover{gap:14px}
.sinn{max-width:1200px;margin:0 auto;padding:100px 5vw}
section{scroll-margin-top:72px}

/* FOOTER - enhanced with NIB */
footer{background:#0E0E08;padding:56px 5vw 32px;border-top:1px solid rgba(248,244,238,.08)}
.footer-top{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:60px;max-width:1200px;margin:0 auto;padding-bottom:40px;border-bottom:1px solid rgba(248,244,238,.08)}
.footer-brand img{width:48px;height:48px;object-fit:contain;opacity:.85;margin-bottom:14px}
.footer-brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:rgba(248,244,238,.95);font-weight:500;margin-bottom:4px}
.footer-brand-tagline{font-family:'Cormorant Garamond',serif;font-size:13px;color:rgba(248,244,238,.55);font-style:italic;margin-bottom:20px}
.footer-nib-box{background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.2);border-radius:3px;padding:14px 16px;margin-top:4px}
.footer-nib-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#C48A00;font-weight:600;margin-bottom:6px}
.footer-nib-num{font-family:'Cormorant Garamond',serif;font-size:17px;color:rgba(248,244,238,.92);font-weight:500;letter-spacing:.05em}
.footer-nib-sub{font-size:10px;color:rgba(248,244,238,.45);margin-top:4px}
.footer-col-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#C48A00;font-weight:600;margin-bottom:18px}
.footer-links-list{display:flex;flex-direction:column;gap:10px}
.footer-links-list a{font-size:13px;color:rgba(248,244,238,.65);text-decoration:none;transition:color .2s}
.footer-links-list a:hover{color:#D4A017}
.footer-address{font-size:13px;color:rgba(248,244,238,.65);line-height:1.8;font-weight:300}
.footer-address a{color:rgba(248,244,238,.65);text-decoration:none}
.footer-address a:hover{color:#D4A017}
.footer-status{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:11px;color:rgba(248,244,238,.45);letter-spacing:.04em}
.footer-status::before{content:'';width:6px;height:6px;background:#4CAF50;border-radius:50%;flex-shrink:0}
.footer-bottom{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:28px auto 0;flex-wrap:wrap;gap:12px}
.footer-copy{font-size:12px;color:rgba(248,244,238,.3)}
.footer-oss{font-size:11px;color:rgba(248,244,238,.3)}
.footer-oss a{color:rgba(212,160,23,.6);text-decoration:none}
.footer-oss a:hover{color:#D4A017}

.fu{opacity:0;transform:translateY(26px);transition:opacity .65s ease,transform .65s ease}
.fu.vis{opacity:1;transform:none}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}

/* HERO */
#hero{min-height:100vh;display:flex;align-items:center;padding:120px 5vw 80px;position:relative;overflow:hidden;background:linear-gradient(135deg,#F8F4EE 55%,#EDE8DF 100%)}
.h-pat{position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(0deg,#2C4A2E 0,#2C4A2E 1px,transparent 1px,transparent 60px),repeating-linear-gradient(90deg,#2C4A2E 0,#2C4A2E 1px,transparent 1px,transparent 60px)}
.h-wm{position:absolute;right:0;top:0;bottom:0;width:42%;display:flex;align-items:center;justify-content:center;opacity:.07;pointer-events:none}
.h-wm img{width:100%;max-width:480px;object-fit:contain}
.hc{position:relative;max-width:700px}
.hbadge{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#7A5500;font-weight:500;margin-bottom:28px}
.hbadge::before{content:'';width:32px;height:1px;background:#7A5500}
.hh1{font-family:'Cormorant Garamond',serif;font-size:clamp(46px,7vw,86px);font-weight:300;line-height:1.05;margin-bottom:24px}
.hh1 em{font-style:italic;color:var(--forest)}
.hp{font-size:16px;line-height:1.8;color:var(--muted);max-width:500px;margin-bottom:44px;font-weight:300}
.hact{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.hst{display:flex;gap:44px;margin-top:60px;padding-top:40px;border-top:1px solid var(--bdr);flex-wrap:wrap}
.snum{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:500;color:#1E3620;line-height:1}
.slbl{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.04em}

/* PRODUCTS PREVIEW */
#prev{background:#1A1A14}
#prev .st{color:#F8F4EE}#prev .si{color:#C48A00}#prev .si::before{background:#C48A00}#prev .ss{color:rgba(248,244,238,.88)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:48px}
.pc{position:relative;overflow:hidden;aspect-ratio:3/4;cursor:pointer;display:block;text-decoration:none}
.pc img.pcbg{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;transition:transform .6s}
.pc:hover img.pcbg{transform:scale(1.06)}
.pcov{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,4,.92) 38%,rgba(6,6,4,.12) 100%)}
.pcb{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:30px 26px}
.ptag{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#F0C040;font-weight:600;margin-bottom:8px}
.pname{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:500;color:#fff;line-height:1.15;margin-bottom:10px}
.porig{font-size:11px;color:#F0C040;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px}
.porig::before{content:'';width:5px;height:5px;background:#F0C040;border-radius:50%;flex-shrink:0}
.bgh{display:inline-block;padding:13px 34px;border:1px solid rgba(248,244,238,.3);color:rgba(248,244,238,.9);font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;border-radius:2px;transition:all .25s;cursor:pointer;text-decoration:none}
.bgh:hover{border-color:#D4A017;color:#D4A017}

/* PRODUCTS DETAIL */
#products{background:var(--cream)}
.pb{padding:80px 0}.pb.alt{background:#F2EDE5}
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:68px;align-items:center;max-width:1200px;margin:0 auto;padding:0 5vw}
.pg2.rev{direction:rtl}.pg2.rev>*{direction:ltr}
.pv{aspect-ratio:4/5;border-radius:2px;overflow:hidden}
.pv img{width:100%;height:100%;object-fit:cover;display:block}
.pbdg{display:inline-block;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#7A5500;font-weight:500;border:1px solid rgba(122,85,0,.35);padding:6px 14px;border-radius:2px;margin-bottom:16px}
.pn{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.5vw,42px);font-weight:300;line-height:1.1;margin-bottom:8px}
.pn em{font-style:italic;color:var(--forest)}
.plat{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:22px;font-weight:300}
.pdesc{font-size:15px;line-height:1.9;color:#2A2A1A;font-weight:300;margin-bottom:26px}
.pspecs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:26px}
.spec{background:rgba(44,74,46,.07);padding:13px 15px;border-radius:2px;border:1px solid rgba(44,74,46,.12)}
.sk{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#7A5500;font-weight:500;margin-bottom:4px}
.sv{font-size:13px;color:#1A1A14;font-weight:500;line-height:1.4}
.ptags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.otag{font-size:11px;padding:5px 11px;background:rgba(44,74,46,.09);color:#1E3620;border-radius:2px;font-weight:500;letter-spacing:.04em}

/* ABOUT */
#about{background:#F2EDE5}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;max-width:1200px;margin:0 auto;padding:100px 5vw}
.av{aspect-ratio:4/5;background:var(--forest);border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:40px;position:relative}
.av img{width:155px;height:155px;object-fit:contain;filter:brightness(0) invert(1);opacity:.95}
.avq{font-family:'Cormorant Garamond',serif;font-size:21px;font-style:italic;color:rgba(248,244,238,.9);text-align:center;line-height:1.6}
.avd{position:absolute;bottom:-18px;right:-18px;width:88px;height:88px;border:1px solid rgba(184,134,11,.35);border-radius:2px}
.sp{font-size:15px;line-height:1.9;color:var(--muted);font-weight:300;margin-bottom:18px}
.vmtb{display:flex;border-bottom:1px solid var(--bdr);margin:28px 0 22px}
.vmb{font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:10px 20px 10px 0;background:none;border:none;cursor:pointer;color:var(--muted);font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;font-family:'DM Sans',sans-serif}
.vmb.on{color:var(--forest);border-bottom-color:var(--forest)}
.vmp{display:none}.vmp.on{display:block}
.vq{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:#1A1A14;line-height:1.65;border-left:2px solid #7A5500;padding-left:20px}
.ml{list-style:none;display:flex;flex-direction:column;gap:14px}
.ml li{display:flex;gap:14px;font-size:14px;line-height:1.7;color:var(--muted);font-weight:300}
.mn{font-family:'Cormorant Garamond',serif;font-size:18px;color:#7A5500;font-weight:500;line-height:1;flex-shrink:0;margin-top:2px}

/* NIB BADGE on about page */
.nib-badge{display:inline-flex;flex-direction:column;gap:3px;background:rgba(44,74,46,.07);border:1px solid rgba(44,74,46,.15);border-radius:3px;padding:14px 18px;margin-top:24px}
.nib-badge-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);font-weight:600}
.nib-badge-val{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--dark);font-weight:500;letter-spacing:.04em}
.nib-badge-sub{font-size:11px;color:var(--muted)}

/* VALUES */
#values{background:#1A1A14;padding:100px 5vw}
#values .st{color:#F8F4EE}#values .si{color:#C48A00}#values .si::before{background:#C48A00}
.vg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:rgba(248,244,238,.06);margin-top:54px;border:1px solid rgba(248,244,238,.06)}
.vc{padding:38px 30px;background:#1A1A14;transition:background .3s}
.vc:hover{background:#1E1E16}
.vi{font-size:24px;margin-bottom:18px;display:block}
.vt{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:500;color:#F8F4EE;margin-bottom:12px}
.vd{font-size:13px;color:rgba(248,244,238,.88);line-height:1.75;font-weight:300}

/* CONTACT */
#contact{background:var(--forest);padding:100px 5vw;position:relative;overflow:hidden}
.kpat{position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(0deg,#fff 0,#fff 1px,transparent 1px,transparent 50px),repeating-linear-gradient(90deg,#fff 0,#fff 1px,transparent 1px,transparent 50px)}
#contact .st{color:#F8F4EE}#contact .si{color:#C48A00}#contact .si::before{background:#C48A00}#contact .ss{color:rgba(248,244,238,.88)}
.kb{display:grid;grid-template-columns:1fr 1fr;gap:80px;max-width:1200px;margin:60px auto 0}
.ciwrap{display:flex;flex-direction:column;gap:26px}
.ci{display:flex;gap:18px}
.ciic{width:44px;height:44px;flex-shrink:0;border:1px solid rgba(248,244,238,.2);display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:2px;color:rgba(248,244,238,.8)}
.cilbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#C48A00;font-weight:500;margin-bottom:4px}
.cival{font-size:14px;color:rgba(248,244,238,.88);font-weight:300;line-height:1.6}
.cival a{color:rgba(248,244,238,.92);text-decoration:none;font-weight:500}
.cival a:hover{color:#D4A017}
.cq{padding:22px;background:rgba(248,244,238,.07);border-radius:2px;border-left:3px solid #C48A00;margin-top:4px}
.cq p{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:rgba(248,244,238,.92);line-height:1.6}
.cq span{font-size:12px;color:rgba(248,244,238,.55);margin-top:8px;display:block}
.cf{display:flex;flex-direction:column;gap:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ff{display:flex;flex-direction:column;gap:7px}
.ff label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(248,244,238,.75);font-weight:500}
.ff input,.ff select,.ff textarea{background:rgba(248,244,238,.08);border:1px solid rgba(248,244,238,.15);color:#F8F4EE;padding:12px 15px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:300;border-radius:2px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.ff input::placeholder,.ff textarea::placeholder{color:rgba(248,244,238,.3)}
.ff select option{background:var(--forest);color:#F8F4EE}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:rgba(212,160,23,.55)}
.ff textarea{resize:vertical;min-height:118px}
.bsend{background:#C48A00;color:#1A1A14;border:none;padding:14px 34px;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .25s;font-family:'DM Sans',sans-serif;align-self:flex-start}
.bsend:hover{background:#D4A017;transform:translateY(-1px)}
.fm{display:none;padding:12px 15px;border-radius:2px;font-size:13px;margin-top:4px}
.fm.ok{background:rgba(248,244,238,.1);color:rgba(248,244,238,.92);border:1px solid rgba(248,244,238,.2)}
.fm.er{background:rgba(220,50,50,.15);color:#ffb0b0;border:1px solid rgba(220,50,50,.3)}

@media(max-width:900px){
  .nav-mid,.nav-cta{display:none}.nt{display:flex}
  .pgrid{grid-template-columns:1fr}.pc{aspect-ratio:4/3}
  .pg2{grid-template-columns:1fr;gap:36px}.pg2.rev{direction:ltr}
  .ag{grid-template-columns:1fr;gap:36px}.av{aspect-ratio:3/2}
  .kb{grid-template-columns:1fr;gap:44px}.fr{grid-template-columns:1fr}
  .h-wm{display:none}.hst{gap:24px}
  .footer-top{grid-template-columns:1fr;gap:36px}
  .footer-bottom{flex-direction:column;align-items:flex-start}
  .pspecs{grid-template-columns:1fr}
}
.ahero{padding:140px 5vw 70px;background:#F2EDE5}</style>
</head>
<body>

<script>

let CL='en';
function setLang(l){
  CL=l;
  localStorage.setItem('mkeLang',l);
  const t=T[l];
  ['EN','ID'].forEach(x=>{
    document.getElementById('btn'+x).classList.toggle('on',x===l.toUpperCase());
    document.getElementById('mb'+x).classList.toggle('on',x===l.toUpperCase());
  });
  [0,1,2,3].forEach(i=>{
    const nav=[t.nav_home,t.nav_products,t.nav_about,t.nav_contact];
    const el=document.getElementById('nv'+i);
    const mel=document.getElementById('mnv'+i);
    if(el)el.textContent=nav[i];
    if(mel)mel.textContent=nav[i];
  });
  // Footer
  document.getElementById('fnib_label').textContent=t.nib_label;
  document.getElementById('fnib_sub').textContent=t.nib_sub;
  document.getElementById('fnav_title').textContent=t.foot_nav_title;
  document.getElementById('fnavlinks').innerHTML=
    `<a href="index.html">${t.foot_home}</a>`+
    `<a href="products.html">${t.foot_prod}</a>`+
    `<a href="about.html">${t.foot_about}</a>`+
    `<a href="contact.html">${t.foot_con}</a>`;
  document.getElementById('fcon_title').textContent=t.foot_addr_title;
  document.getElementById('faddress').innerHTML=
    `<a href="mailto:mudakaryaexport@gmail.com">${t.ci1v}</a><br>`+
    `<a href="tel:+628111962207">${t.ci3v}</a><br>`+
    t.ci4v+
    `<span class="footer-status">${t.nib_sub}</span>`;
  document.getElementById('frights').textContent='PT Muda Karya Export - '+t.rights;
  document.getElementById('foss').innerHTML=`NIB: 2605260072988 | <a href="https://oss.go.id" target="_blank">${t.oss_verify}</a>`;
  if(typeof applyPage==='function') applyPage(t);
  document.querySelectorAll('.fu:not(.vis)').forEach(el=>obs.observe(el));
}
document.getElementById('ntbtn').addEventListener('click',()=>document.getElementById('mmenu').classList.toggle('open'));
document.querySelectorAll('.mm a').forEach(a=>a.addEventListener('click',()=>document.getElementById('mmenu').classList.remove('open')));
const obs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('vis')}),{threshold:.1});
document.querySelectorAll('.fu').forEach(el=>obs.observe(el));


function showVM(i){
  document.querySelectorAll('.vmp').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.vmb').forEach(e=>e.classList.remove('on'));
  document.getElementById('vm'+i).classList.add('on');
  document.getElementById('vt'+i).classList.add('on');
}
function applyPage(t){
  document.getElementById('ablbl').textContent=t.about_label;
  document.getElementById('abtit').innerHTML=t.about_title;
  document.getElementById('absub').textContent=t.about_sub;
  document.getElementById('avq').textContent=t.tagline;
  document.getElementById('slbl').textContent=t.story_label;
  document.getElementById('sh').innerHTML=t.story_h;
  ['1','2','3'].forEach(i=>document.getElementById('sp'+i).textContent=t['story'+i]);
  document.getElementById('vt0').textContent=t.vision_tab;
  document.getElementById('vt1').textContent=t.mission_tab;
  document.getElementById('vtxt').textContent=t.vision;
  document.getElementById('mlist').innerHTML=['m1','m2','m3','m4'].map((k,i)=>`<li><span class="mn">0${i+1}</span><span>${t[k]}</span></li>`).join('');
  document.getElementById('vlbl').textContent=t.val_label;
  document.getElementById('vtit2').innerHTML=t.val_title;
  document.getElementById('vgrid').innerHTML=[
    ['v1t','v1d'],['v2t','v2d'],['v3t','v3d'],['v4t','v4d']
  ].map(([tk,dk],i)=>`<div class="vc fu"><span class="vi">${['◈','◎','◆','◉'][i]}</span><div class="vt">${t[tk]}</div><div class="vd">${t[dk]}</div></div>`).join('');
  document.getElementById('nib_badge_lbl').textContent=t.nib_badge_label;
  document.getElementById('nib_badge_sub').textContent=t.nib_badge_sub;
  document.querySelectorAll('.fu:not(.vis)').forEach(el=>obs.observe(el));
}

const saved=localStorage.getItem('mkeLang')||'en';setLang(saved);
